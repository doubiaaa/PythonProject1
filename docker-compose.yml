version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: python-project1-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: python_project1
      MYSQL_USER: python_project1
      MYSQL_PASSWORD: python_project1
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  redis:
    image: redis:7.0
    container_name: python-project1-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: python-project1-backend
    ports:
      - "8000:8000"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=python_project1
      - MYSQL_PASSWORD=python_project1
      - MYSQL_DATABASE=python_project1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - SECRET_KEY=your-secret-key-change-in-production
    depends_on:
      - mysql
      - redis
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: python-project1-frontend
    ports:
      - "3000:3000"
    restart: always

volumes:
  mysql_data:
  redis_data:
