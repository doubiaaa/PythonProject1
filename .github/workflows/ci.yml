# 推送与 PR 时安装依赖并做导入自检（不访问外网行情接口）
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Smoke test (import Flask app)
        run: python -c "from app import app; assert app is not None"

      - name: Run pytest
        run: pytest tests/ -q

      - name: Validate configs and data
        run: python scripts/validate.py
