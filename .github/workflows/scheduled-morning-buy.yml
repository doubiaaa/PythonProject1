# 北京时间工作日约 9:31 执行模拟账户「次日开盘买入」；非交易日或无需处理时脚本自行退出 0。
# 须在 replay_config.json（或 Secrets：ENABLE_SIMULATED_ACCOUNT / SIMULATED_BUY_PRICE_TYPE）中同时开启：
#   enable_simulated_account: true
#   simulated_buy_price_type: next_day_open
# cron 使用 UTC：北京时间 9:31 = UTC 1:31（中国无夏令时）。
# 注意：GitHub 托管 runner 不持久化 data/simulated_account.json；若需云端执行，请用自托管 runner、
# Artifact 持久化，或仅在本地/定时任务机器上运行本脚本。
name: Simulated morning buy (~9:31 CST)

on:
  schedule:
     - cron: "31 1 * * 1-5"
  workflow_dispatch:

concurrency:
  group: simulated-morning-buy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  morning-buy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run simulated morning buy
        env:
          ENABLE_SIMULATED_ACCOUNT: ${{ secrets.ENABLE_SIMULATED_ACCOUNT }}
          SIMULATED_BUY_PRICE_TYPE: ${{ secrets.SIMULATED_BUY_PRICE_TYPE }}
        run: |
          set -e
          # 可选：在 Secrets 中设置 ENABLE_SIMULATED_ACCOUNT=true / SIMULATED_BUY_PRICE_TYPE=next_day_open
          # 若未配置，脚本仍读取仓库内 replay_config.json（若已提交并含开关）
          python scripts/simulated_morning_buy.py
