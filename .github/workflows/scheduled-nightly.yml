# 北京时间每天约 18:00 触发（在 19:30 基础上再提早 1.5h，进一步抵消 Actions 常见1h+ 延迟）。
# 仅当「当日为 A 股交易日」时才跑复盘，周末/节假日直接跳过（成功退出）。
# 须在仓库 Secrets 中配置（Settings → Secrets and variables → Actions）：
#   DEEPSEEK_API_KEY    DeepSeek API Key（推荐；未设时可沿用旧名 ZHIPU_API_KEY）
# 可选邮件：
#   SMTP_HOST SMTP_PORT SMTP_USER SMTP_PASSWORD SMTP_FROM MAIL_TO
#   SMTP_SSL  填 true / 1 表示 SMTPS（465）；留空则默认 STARTTLS（587）
#
# 说明：cron 使用 UTC。北京时间 18:00 = UTC 10:00。GitHub 可能对定时任务有几分钟到超 1 小时抖动。
# 仅默认分支会按计划执行；并发组避免定时与手动同时跑两套任务。
name: Nightly replay (~18:00 CST)

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "可选，指定复盘日 YYYYMMDD（须为交易日）。留空则按北京时间当日判断。"
        required: false
        type: string

concurrency:
  group: nightly-replay-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  replay:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run nightly replay
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SMTP_SSL: ${{ secrets.SMTP_SSL }}
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            D='${{ github.event.inputs.date }}'
            if [ -n "$D" ]; then
              python scripts/nightly_replay.py --date "$D"
              exit $?
            fi
          fi
          python scripts/nightly_replay.py
